<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Task Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: "class"
    };
</script>
</head>

<body class="min-h-screen bg-fixed bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-gray-800 transition-colors duration-300 dark:from-gray-950 dark:via-gray-900 dark:to-indigo-950 dark:text-gray-100">
    <nav class="backdrop-blur-md bg-white/70 border-b border-gray-200 sticky top-0 z-10 transition-colors duration-300 dark:bg-gray-900/80 dark:border-gray-700">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-300">TaskTracker</h1>
            <button id="themeBtn" data-theme="light" title="Switch theme" class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded-lg flex gap-2 transition dark:bg-gray-800 dark:hover:bg-gray-700 dark:text-white">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </button>
        </div>
    </nav>
    <section class="text-center py-12 px-4">
        <h2 class="text-4xl font-extrabold text-gray-800 dark:text-white">
            Organize Your Study Life
        </h2>
        <p class="text-gray-500 mt-3 max-w-xl mx-auto dark:text-gray-300">
            Add tasks, set deadlines, and stay productive with a clean and simple tracker designed for students.
        </p>
    </section>
    <section class="max-w-5xl mx-auto px-4">
        <div class="bg-white shadow-xl rounded-2xl p-6 border border-gray-100 transition-colors duration-300 dark:bg-gray-900 dark:border-gray-700">
            <h3 class="text-lg font-semibold mb-4 text-gray-700 dark:text-gray-100">Add New Task</h3>
            <div class="grid md:grid-cols-3 gap-4">
            <input id="taskInput"
                type="text"
                placeholder="e.g. Finish JavaScript assignment"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:placeholder-gray-400"/>

            <input id="dateInput"
                type="date"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none dark:bg-gray-800 dark:border-gray-700 dark:text-white"/>

            <button onclick="addTask()"
                class="bg-indigo-600 text-white rounded-xl py-3 font-semibold hover:bg-indigo-700 transition dark:bg-indigo-500 dark:hover:bg-indigo-600">
                Add Task
            </button>
            </div>
            <p id="error" class="text-red-500 text-sm mt-3 hidden">
                Please fill in both task and due date
            </p>
        </div>
    </section>
    <section class="max-w-5xl mx-auto px-4 mt-10">
    <h3 class="text-xl font-bold text-gray-700 mb-4 dark:text-gray-100">Tasks</h3>

    <div id="taskList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
