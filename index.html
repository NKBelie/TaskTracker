<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Task Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 min-h-screen">
    <nav class="backdrop-blur-md bg-white/70 border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">TaskTracker</h1>
            <button id="themeBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded-lg flex gap-2 ">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>
    </nav>
    <section class="text-center py-12 px-4">
        <h2 class="text-4xl font-extrabold text-gray-800">
            Organize Your Study Life
        </h2>
        <p class="text-gray-500 mt-3 max-w-xl mx-auto">
            Add tasks, set deadlines, and stay productive with a clean and simple tracker designed for students.
        </p>
    </section>
    <section class="max-w-3xl mx-auto px-4">
        <div class="bg-white shadow-xl rounded-2xl p-6 border border-gray-100">
            <h3 class="text-lg font-semibold mb-4 text-gray-700">Add New Task</h3>
            <div class="grid md:grid-cols-3 gap-4">
            <input id="taskInput"
                type="text"
                placeholder="e.g. Finish JavaScript assignment"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none"/>

            <input id="dateInput"
                type="date"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none"/>

            <button onclick="addTask()"
                class="bg-indigo-600 text-white rounded-xl py-3 font-semibold hover:bg-indigo-700 transition">
                Add Task
            </button>
            </div>
            <p id="error" class="text-red-500 text-sm mt-3 hidden">
                Please fill in both task and due date
            </p>
        </div>
    </section>
    <section class="max-w-5xl mx-auto px-4 mt-10">
    <h3 class="text-xl font-bold text-gray-700 mb-4">Tasks</h3>

    <div id="taskList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>
    <!-- Add javascript  -->
    <script>
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        window.onload = renderTasks;

        function addTask() {
            const taskInput = document.getElementById("taskInput");
            const dateInput = document.getElementById("dateInput");
            const error = document.getElementById("error");

            const name = taskInput.value.trim();
            const date = dateInput.value;

                if (!name || !date) {
                    error.classList.remove("hidden");
                    return;
                }

                error.classList.add("hidden");

            const task = {
                id: Date.now(),
                name,
                date
            };

            tasks.push(task);
            localStorage.setItem("tasks", JSON.stringify(tasks));

            taskInput.value = "";
            dateInput.value = "";

            renderTasks();
        }
        function renderTasks() {
            const container = document.getElementById("taskList");
            container.innerHTML = "";

            tasks.forEach(task => {
                container.innerHTML += `
                <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-5
                            hover:shadow-xl hover:-translate-y-1 transition duration-300">

                    <h4 class="text-lg font-bold text-gray-800">${task.name}</h4>

                    <p class="text-sm text-gray-500 mt-2">
                    Due: <span class="font-medium text-indigo-600">${task.date}</span>
                    </p>

                    <button onclick="deleteTask(${task.id})"
                    class="mt-4 w-full bg-red-50 text-red-600 py-2 rounded-xl
                            hover:bg-red-100 transition font-semibold">
                    Delete Task
                    </button>
                </div>
                `;
            });
        }
        function deleteTask(id) {
            const confirmDelete = confirm("Are you sure you want to delete this task?");

            if (!confirmDelete) {
                return;
            }

            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }
</script>
</body>
</html>
