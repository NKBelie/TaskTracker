<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Task Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: "class"
    };
</script>
</head>

<body class="min-h-screen bg-fixed bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-gray-800 transition-colors duration-300 dark:from-gray-950 dark:via-gray-900 dark:to-indigo-950 dark:text-gray-100">
    <nav class="backdrop-blur-md bg-white/70 border-b border-gray-200 sticky top-0 z-10 transition-colors duration-300 dark:bg-gray-900/80 dark:border-gray-700">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-300">TaskTracker</h1>
            <button id="themeBtn" data-theme="light" title="Switch theme" class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded-lg flex gap-2 transition dark:bg-gray-800 dark:hover:bg-gray-700 dark:text-white">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </button>
        </div>
    </nav>
    <section class="text-center py-12 px-4">
        <h2 class="text-4xl font-extrabold text-gray-800 dark:text-white">
            Organize Your Study Life
        </h2>
        <p class="text-gray-500 mt-3 max-w-xl mx-auto dark:text-gray-300">
            Add tasks, set deadlines, and stay productive with a clean and simple tracker designed for students.
        </p>
    </section>
    <section class="max-w-3xl mx-auto px-4">
        <div class="bg-white shadow-xl rounded-2xl p-6 border border-gray-100 transition-colors duration-300 dark:bg-gray-900 dark:border-gray-700">
            <h3 class="text-lg font-semibold mb-4 text-gray-700 dark:text-gray-100">Add New Task</h3>
            <div class="grid md:grid-cols-3 gap-4">
            <input id="taskInput"
                type="text"
                placeholder="e.g. Finish JavaScript assignment"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:placeholder-gray-400"/>

            <input id="dateInput"
                type="date"
                class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 outline-none dark:bg-gray-800 dark:border-gray-700 dark:text-white"/>

            <button onclick="addTask()"
                class="bg-indigo-600 text-white rounded-xl py-3 font-semibold hover:bg-indigo-700 transition dark:bg-indigo-500 dark:hover:bg-indigo-600">
                Add Task
            </button>
            </div>
            <p id="error" class="text-red-500 text-sm mt-3 hidden">
                Please fill in both task and due date
            </p>
        </div>
    </section>
    <section class="max-w-5xl mx-auto px-4 mt-10">
    <h3 class="text-xl font-bold text-gray-700 mb-4 dark:text-gray-100">Tasks</h3>

    <div id="taskList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>
    <!-- Add javascript  -->
    <script>
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        window.onload = function () {
            loadTheme();
            renderTasks();
        };

        function addTask() {
            const taskInput = document.getElementById("taskInput");
            const dateInput = document.getElementById("dateInput");
            const error = document.getElementById("error");

            const name = taskInput.value.trim();
            const date = dateInput.value;

                if (!name || !date) {
                    error.classList.remove("hidden");
                    return;
                }

                error.classList.add("hidden");

            const task = {
                id: Date.now(),
                name,
                date
            };

            tasks.push(task);
            localStorage.setItem("tasks", JSON.stringify(tasks));

            taskInput.value = "";
            dateInput.value = "";

            renderTasks();
        }
        function renderTasks() {
            const container = document.getElementById("taskList");
            container.innerHTML = "";

            tasks.forEach(task => {
                container.innerHTML += `
                <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-5
                            hover:shadow-xl hover:-translate-y-1 transition duration-300 dark:bg-gray-900 dark:border-gray-700">

                    <h4 class="text-lg font-bold text-gray-800 dark:text-white">${task.name}</h4>

                    <p class="text-sm text-gray-500 mt-2 dark:text-gray-300">
                    Due: <span class="font-medium text-indigo-600 dark:text-indigo-300">${task.date}</span>
                    </p>

                    <button onclick="deleteTask(${task.id})"
                    class="mt-4 w-full bg-red-50 text-red-600 py-2 rounded-xl
                            hover:bg-red-100 transition font-semibold dark:bg-red-900/30 dark:text-red-300 dark:hover:bg-red-900/50">
                    Delete Task
                    </button>
                </div>
                `;
            });
        }
        function deleteTask(id) {
            const confirmDelete = confirm("Are you sure you want to delete this task?");

            if (!confirmDelete) {
                return;
            }

            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }

        const themeBtn = document.getElementById("themeBtn");
        const themeIcon = document.getElementById("themeIcon");
        const moonIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
        const sunIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';

        function setDarkTheme() {
            document.documentElement.className = "dark";
            document.documentElement.classList.add("dark");
            themeIcon.innerHTML = moonIcon;
            themeBtn.dataset.theme = "dark";
            localStorage.setItem("theme", "dark");
        }

        function setLightTheme() {
            document.documentElement.className = "";
            themeIcon.innerHTML = sunIcon;
            themeBtn.dataset.theme = "light";
            localStorage.setItem("theme", "light");
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                setDarkTheme();
            } else {
                setLightTheme();
            }
        }

        themeBtn.addEventListener("click", function () {
            if (themeBtn.dataset.theme === "dark") {
                setLightTheme();
            } else {
                setDarkTheme();
            }
        });
</script>
</body>
</html>
